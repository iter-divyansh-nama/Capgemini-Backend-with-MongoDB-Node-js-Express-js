<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniChat</title>

  <!-- Socket.IO client from CDN -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body style="
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background: #0f0f13;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
">

  <!-- Chat Container -->
  <div style="
    width: 420px;
    background: #1a1a24;
    border: 1px solid #2e2e42;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
    display: flex;
    flex-direction: column;
    height: 600px;
  ">

    <!-- Header -->
    <div style="
      background: #12121c;
      padding: 16px 20px;
      border-bottom: 1px solid #2e2e42;
      display: flex;
      align-items: center;
      justify-content: space-between;
    ">
      <div style="display: flex; align-items: center; gap: 10px;">
        <div style="
          width: 10px; height: 10px;
          background: #22c55e;
          border-radius: 50%;
          box-shadow: 0 0 8px #22c55e;
        "></div>
        <span style="color: #e2e8f0; font-size: 15px; font-weight: bold; letter-spacing: 1px;">
          MINICHAT
        </span>
      </div>
      <span id="user-count" style="
        color: #6366f1;
        font-size: 12px;
        background: rgba(99,102,241,0.1);
        padding: 3px 10px;
        border-radius: 20px;
        border: 1px solid #6366f133;
      ">1 online</span>
    </div>

    <!-- Messages Area -->
    <div id="messages" style="
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: #2e2e42 transparent;
    ">
      <!-- Messages injected here -->
    </div>

    <!-- Typing Indicator -->
    <div id="typing-indicator" style="
      padding: 0 20px 4px;
      font-size: 11px;
      color: #6366f1;
      min-height: 18px;
      font-style: italic;
    "></div>

    <!-- Input Area -->
    <div style="
      padding: 12px 16px;
      border-top: 1px solid #2e2e42;
      display: flex;
      gap: 10px;
      background: #12121c;
    ">
      <input
        id="msg-input"
        type="text"
        placeholder="Type a message..."
        maxlength="300"
        style="
          flex: 1;
          background: #1a1a24;
          border: 1px solid #2e2e42;
          border-radius: 8px;
          padding: 10px 14px;
          color: #e2e8f0;
          font-family: 'Courier New', monospace;
          font-size: 13px;
          outline: none;
          transition: border-color 0.2s;
        "
        onfocus="this.style.borderColor='#6366f1'"
        onblur="this.style.borderColor='#2e2e42'"
      />
      <button
        id="send-btn"
        onclick="sendMessage()"
        style="
          background: #6366f1;
          color: white;
          border: none;
          border-radius: 8px;
          padding: 10px 18px;
          font-size: 13px;
          font-family: 'Courier New', monospace;
          cursor: pointer;
          transition: background 0.2s;
          font-weight: bold;
          letter-spacing: 0.5px;
        "
        onmouseover="this.style.background='#4f46e5'"
        onmouseout="this.style.background='#6366f1'"
      >SEND</button>
    </div>
  </div>

<script>
  const socket = io();  // Connect to the server

  // Generate a random display name for this tab/session
  const myName = "user_" + Math.random().toString(36).slice(2, 6);

  // ─── Receive: chat message ───────────────────────────────────────
  socket.on("chat_message", (data) => {
    const isMine = data.id === socket.id.slice(0, 6);
    appendMessage({
      type: "chat",
      isMine,
      id: isMine ? "you" : data.id,
      text: data.text,
      timestamp: data.timestamp,
    });
  });

  // ─── Receive: system message ─────────────────────────────────────
  socket.on("system_message", (msg) => {
    appendMessage({ type: "system", text: msg });
  });

  // ─── Receive: user count ─────────────────────────────────────────
  socket.on("user_count", (count) => {
    document.getElementById("user-count").textContent =
      count + (count === 1 ? " online" : " online");
  });

  // ─── Receive: typing indicator ───────────────────────────────────
  let typingTimeout;
  socket.on("typing", ({ userId, isTyping }) => {
    const el = document.getElementById("typing-indicator");
    if (isTyping) {
      el.textContent = `${userId} is typing...`;
    } else {
      el.textContent = "";
    }
  });

  // ─── Send message ────────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById("msg-input");
    const text = input.value.trim();
    if (!text) return;

    socket.emit("chat_message", { text });
    socket.emit("typing", false);  // Stop typing indicator
    input.value = "";
    input.focus();
  }

  // ─── Typing detection ────────────────────────────────────────────
  document.getElementById("msg-input").addEventListener("input", () => {
    socket.emit("typing", true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => socket.emit("typing", false), 1500);
  });

  // ─── Enter key to send ───────────────────────────────────────────
  document.getElementById("msg-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  // ─── Append message to UI ────────────────────────────────────────
  function appendMessage({ type, isMine, id, text, timestamp }) {
    const container = document.getElementById("messages");

    const el = document.createElement("div");

    if (type === "system") {
      el.style.cssText = `
        text-align: center;
        font-size: 11px;
        color: #4b5563;
        padding: 4px 0;
        font-style: italic;
      `;
      el.textContent = `— ${text} —`;
    } else {
      el.style.cssText = `
        display: flex;
        flex-direction: column;
        align-items: ${isMine ? "flex-end" : "flex-start"};
      `;

      const bubble = document.createElement("div");
      bubble.style.cssText = `
        max-width: 75%;
        background: ${isMine ? "#6366f1" : "#252535"};
        color: ${isMine ? "#fff" : "#cbd5e1"};
        padding: 8px 12px;
        border-radius: ${isMine ? "12px 12px 2px 12px" : "12px 12px 12px 2px"};
        font-size: 13px;
        line-height: 1.5;
        word-break: break-word;
      `;
      bubble.textContent = text;

      const meta = document.createElement("div");
      meta.style.cssText = `
        font-size: 10px;
        color: #4b5563;
        margin-top: 3px;
        padding: 0 4px;
      `;
      meta.textContent = `${id} · ${timestamp}`;

      el.appendChild(bubble);
      el.appendChild(meta);
    }

    container.appendChild(el);
    container.scrollTop = container.scrollHeight;  // Auto-scroll
  }
</script>
</body>
</html>
